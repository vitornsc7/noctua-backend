spring.application.name=noctua-backend

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/noctua}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

jwt.secret=${JWT_SECRET:noctuaSecretKeyForJwtSigningMustBe256BitsLongAtLeast!}
jwt.expiration-ms=86400000
jwt.expiration-ms-extended=2592000000

app.frontend.url=${FRONTEND_URL:http://localhost:3000}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true